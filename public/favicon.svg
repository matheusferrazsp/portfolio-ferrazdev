<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Deep Dark Obsidian/Carbon Background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101420" />
      <stop offset="50%" stop-color="#080a10" />
      <stop offset="100%" stop-color="#040508" />
    </linearGradient>

    <!-- Border Glow Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.35" />
    </linearGradient>

    <!-- Vibrant Sky to Cyan Tech Gradient for Brackets -->
    <linearGradient id="sky-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Indigo-Violet Accent Gradient for Center Slash -->
    <linearGradient id="slash-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Center Radial Glow -->
    <radialGradient id="tech-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Rounded Box -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="1.5" />

  <!-- Subtle Ambient Glow -->
  <circle cx="32" cy="32" r="26" fill="url(#tech-glow)" />

  <!-- Subtle Tech Grid lines in Background -->
  <path d="M16 16 H48 M16 48 H48" stroke="#1e293b" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 4" />
  <path d="M16 16 V48 M48 16 V48" stroke="#1e293b" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 4" />

  <!-- Left Code Bracket: < -->
  <path d="M23 19 L11 32 L23 45" stroke="url(#sky-cyan)" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Center Slash (Dynamic Stack Beam): / -->
  <path d="M28 47 L36 17" stroke="url(#slash-grad)" stroke-width="4.8" stroke-linecap="round" />

  <!-- Right Code Bracket: > -->
  <path d="M41 19 L53 32 L41 45" stroke="url(#sky-cyan)" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Operational Status Dot (Green Pulse Indicator) -->
  <circle cx="52" cy="51" r="2.8" fill="#10b981" />
  <circle cx="52" cy="51" r="2.8" fill="#10b981" opacity="0.4">
    <animate attributeName="r" values="2.8;6;2.8" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>